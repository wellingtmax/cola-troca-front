<app-public-auth-shell
  activePage="register"
  pageTitle="Criar conta"
  pageSubtitle="Comece sua coleção no Cola&Troca."
>

  <div
    *ngIf="errorMessage"
    class="mb-5 rounded-2xl border border-red-500/40 bg-red-500/10 px-5 py-4 text-red-300 text-sm font-bold"
  >
    {{ errorMessage }}
  </div>

  <div
    *ngIf="successMessage"
    class="mb-5 rounded-2xl border border-emerald-500/40 bg-emerald-500/10 px-5 py-4 text-emerald-300 text-sm font-bold"
  >
    {{ successMessage }}
  </div>

  <form
    class="space-y-5"
    (ngSubmit)="register()"
  >

    <input
      [(ngModel)]="name"
      name="name"
      type="text"
      placeholder="Nome"
      autocomplete="name"
      class="auth-input"
    />

    <input
      [(ngModel)]="email"
      name="email"
      type="email"
      placeholder="E-mail"
      autocomplete="email"
      class="auth-input"
    />

    <input
      [(ngModel)]="password"
      name="password"
      type="password"
      placeholder="Senha"
      autocomplete="new-password"
      class="auth-input"
    />

    <button
      type="submit"
      [disabled]="loading"
      class="auth-submit-button"
    >
      {{ loading ? 'Cadastrando...' : 'Cadastrar' }}
    </button>

  </form>

  <p class="auth-bottom-text">
    Já tem conta?

    <a routerLink="/login">
      Entrar
    </a>
  </p>

</app-public-auth-shell>
