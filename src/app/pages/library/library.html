<div class="library-page">

  <div class="library-header">

    <div>
      <h1>
        Minha Biblioteca
      </h1>

      <p>
        Seus álbuns comprados aparecerão aqui.
      </p>
    </div>

  </div>

  <!-- =======================buscar -->
  <div class="w-full mb-10">

    <div class="
      grid
      grid-cols-1
      md:grid-cols-2
      xl:grid-cols-4
      gap-4
    ">

      <!-- BUSCA -->

      <div class="relative xl:col-span-2">

        <mat-icon class="
          absolute
          left-4
          top-1/2
          -translate-y-1/2
          text-zinc-500
        ">
          search
        </mat-icon>

        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Buscar álbum..."
          class="library-filter-input"
        />

      </div>

      <!-- EMPRESA -->

      <div class="relative">

        <mat-icon class="
          absolute
          left-4
          top-1/2
          -translate-y-1/2
          text-zinc-500
          pointer-events-none
        ">
          business
        </mat-icon>

        <select
        [(ngModel)]="selectedCompany"
        class="library-filter-input"
          >

          <option value="">
            Todas as empresas
          </option>

          <option *ngFor="let company of companies" [value]="company">
            {{ company }}
          </option>

        </select>

      </div>

      <!-- CATEGORIA -->

      <div class="relative">

        <mat-icon class="
          absolute
          left-4
          top-1/2
          -translate-y-1/2
          text-zinc-500
          pointer-events-none
        ">
          category
        </mat-icon>

        <select
          [(ngModel)]="selectedCategory"
          class="library-filter-input"
        >

          <option value="">
            Todas as categorias
          </option>

          <option *ngFor="let category of categories" [value]="category">
            {{ category }}
          </option>

        </select>

      </div>

    </div>

  </div>
  <!-- ============================== -->

  <div
    *ngIf="loading"
    class="library-loading"
  >

    <div class="spinner"></div>

    <p>
      Carregando biblioteca...
    </p>

  </div>

  <div
    *ngIf="!loading && albums.length === 0"
    class="library-empty"
  >

    <h2>
      Sua biblioteca está vazia
    </h2>

    <p>
      Compre um álbum na loja para começar sua coleção.
    </p>

    <a
      routerLink="/loja"
      class="library-button"
    >
      Ir para Loja
    </a>

  </div>

  <div
    *ngIf="!loading && albums.length > 0"
    class="library-grid"
  >

    <app-album-card
      *ngFor="let album of filteredAlbums"
      [album]="album"
      [showPrice]="false"
    />

  </div>

</div>
