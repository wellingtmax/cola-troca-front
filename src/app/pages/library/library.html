<div class="text-white p-4 md:p-10">

  <div class="flex items-center justify-between mb-10">

    <div>

      <h1 class="text-5xl font-bold mb-3">
        Minha Biblioteca
      </h1>

      <p class="text-zinc-400 text-lg">
        Seus álbuns comprados aparecerão aqui.
      </p>

    </div>

  </div>

  <div
    *ngIf="loading"
    class="flex items-center justify-center h-96"
  >

    <div class="text-center">

      <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>

      <p class="text-zinc-400 text-xl">
        Carregando biblioteca...
      </p>

    </div>

  </div>

  <div
    *ngIf="!loading && albums.length === 0"
    class="bg-zinc-950 border border-zinc-800 rounded-3xl p-10 text-center"
  >

    <h2 class="text-4xl font-bold mb-4">
      Sua biblioteca está vazia
    </h2>

    <p class="text-zinc-400 text-lg mb-8">
      Compre um álbum na loja para começar sua coleção.
    </p>

    <a
      routerLink="/store"
      class="bg-emerald-500 hover:bg-emerald-600 px-8 py-4 rounded-2xl font-bold text-white transition"
    >
      Ir para Loja
    </a>

  </div>

  <div
    *ngIf="!loading && albums.length > 0"
    class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"
  >

    <app-album-card
      *ngFor="let album of albums"
      [album]="album"
    />

  </div>

</div>
