<app-public-auth-shell
  activePage="login"
  pageTitle="Entrar"
  pageSubtitle="Acesse sua conta e continue sua coleção."
>

  <div
    *ngIf="errorMessage"
    class="mb-5 rounded-2xl border border-red-500/40 bg-red-500/10 px-5 py-4 text-red-300 text-sm font-bold"
  >
    {{ errorMessage }}
  </div>

  <div
    *ngIf="successMessage"
    class="mb-5 rounded-2xl border border-emerald-500/40 bg-emerald-500/10 px-5 py-4 text-emerald-300 text-sm font-bold"
  >
    {{ successMessage }}
  </div>

  <form
    class="space-y-5"
    (ngSubmit)="login()"
  >

    <input
      [(ngModel)]="email"
      name="email"
      type="email"
      placeholder="E-mail"
      autocomplete="email"
      class="auth-input"
    />

    <input
      [(ngModel)]="password"
      name="password"
      type="password"
      placeholder="Senha"
      autocomplete="current-password"
      class="auth-input"
    />

    <button
      type="submit"
      [disabled]="loading"
      class="auth-submit-button"
    >
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>

  </form>

  <p class="auth-bottom-text">
    Ainda não tem conta?

    <a routerLink="/register">
      Criar conta
    </a>
  </p>

  <p class="auth-home-link">
    <a routerLink="/home">
      Voltar para Home
    </a>
  </p>

</app-public-auth-shell>
