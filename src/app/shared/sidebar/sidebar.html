<div class="sidebar-shell">

  <div class="sidebar-brand">
    <h1>
      Cola&Troca
    </h1>

    <p>
      Álbum digital colecionável
    </p>
  </div>

  <nav class="sidebar-nav">

    <div class="sidebar-section">
      <p class="section-title">
        Loja
      </p>

      <a routerLink="/loja" routerLinkActive="active-link" class="sidebar-link">
        <mat-icon>store</mat-icon>
        <span>Álbuns</span>
      </a>

      <a routerLink="/packs" routerLinkActive="active-link" class="sidebar-link">
        <mat-icon>inventory_2</mat-icon>
        <span>Packs de Figurinhas</span>
      </a>
    </div>

    <div class="sidebar-section">
      <p class="section-title">
        Minha Conta
      </p>

      <a routerLink="/biblioteca" routerLinkActive="active-link" class="sidebar-link">

        <mat-icon>collections_bookmark</mat-icon>

        <div class="sidebar-link-content">

          <span>Minha Biblioteca</span>

          <div *ngIf="pendingAlbumsCount > 0" class="sidebar-badge">
            {{ pendingAlbumsCount }}
          </div>

        </div>

      </a>

      <a routerLink="/figurinhas" routerLinkActive="active-link" class="sidebar-link">
        <mat-icon>style</mat-icon>
        <span>Figurinhas</span>
      </a>


      <a routerLink="/trocas" routerLinkActive="sidebar-link-active" class="sidebar-link">
        <mat-icon>swap_horiz</mat-icon>
        <span>Troca de Figurinhas</span>
      </a>

      <a routerLink="/bafo" routerLinkActive="sidebar-link-active" class="sidebar-link">
        <mat-icon>sports_esports</mat-icon>
        <span>Bafo Bafo</span>
      </a>

      <a routerLink="/chat-global" routerLinkActive="sidebar-link-active" class="sidebar-link">
        <mat-icon>forum</mat-icon>
        <span>Chat Global</span>
      </a>

      <a routerLink="/perfil" routerLinkActive="active-link" class="sidebar-link">
        <mat-icon>person</mat-icon>
        <span>Perfil</span>
      </a>
    </div>

  </nav>

  <div class="sidebar-footer">

    <button (click)="toggleTheme()" class="theme-button">
      <mat-icon>
        {{ themeService.currentTheme === 'dark' ? 'light_mode' : 'dark_mode' }}
      </mat-icon>

      {{ themeService.currentTheme === 'dark' ? 'Tema Claro' : 'Tema Escuro' }}
    </button>

    <button class="logout-button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      Sair
    </button>

  </div>

</div>
