<div class="h-screen w-72 bg-zinc-950 border-r border-zinc-800 flex flex-col">

  <div class="p-6 border-b border-zinc-800">
    <h1 class="text-3xl font-bold text-emerald-400">
      Cola&Troca
    </h1>

    <p class="text-zinc-400 text-sm mt-1">
      Álbum digital colecionável
    </p>
  </div>

  <nav class="flex-1 p-4 space-y-6 overflow-y-auto">

    <div>
      <p class="text-xs uppercase tracking-widest text-zinc-500 px-4 mb-2">
        Loja
      </p>

      <a
        routerLink="/loja"
        routerLinkActive="bg-zinc-900 text-white"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-zinc-900 transition text-zinc-300"
      >
        <mat-icon>store</mat-icon>
        <span>Álbuns</span>
      </a>

      <a
        routerLink="/packs"
        routerLinkActive="bg-zinc-900 text-white"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-zinc-900 transition text-zinc-300"
      >
        <mat-icon>inventory_2</mat-icon>
        <span>Packs de Figurinhas</span>
      </a>
    </div>

    <div>
      <p class="text-xs uppercase tracking-widest text-zinc-500 px-4 mb-2">
        Minha Conta
      </p>

      <a
        routerLink="/biblioteca"
        routerLinkActive="bg-zinc-900 text-white"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-zinc-900 transition text-zinc-300"
      >
        <mat-icon>collections_bookmark</mat-icon>
        <span>Minha Biblioteca</span>
      </a>

      <a
        routerLink="/repetidas"
        routerLinkActive="bg-zinc-900 text-white"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-zinc-900 transition text-zinc-300"
      >
        <mat-icon>sync_alt</mat-icon>
        <span>Repetidas</span>
      </a>

      <a
        routerLink="/perfil"
        routerLinkActive="bg-zinc-900 text-white"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-zinc-900 transition text-zinc-300"
      >
        <mat-icon>person</mat-icon>
        <span>Perfil</span>
      </a>
    </div>

  </nav>

  <div class="p-4 border-t border-zinc-800 space-y-3">

    <button
      class="w-full bg-zinc-900 hover:bg-zinc-800 text-white font-bold py-3 rounded-2xl transition flex items-center justify-center gap-3"
    >
      <mat-icon>dark_mode</mat-icon>
      Tema
    </button>

    <button
      class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-2xl transition flex items-center justify-center gap-3"
      (click)="logout()"
    >
      <mat-icon>logout</mat-icon>
      Sair
    </button>

  </div>

</div>
