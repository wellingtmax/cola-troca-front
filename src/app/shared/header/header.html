<header class="header-container">

  <div class="header-left">

    <h2 class="logo-title">
      Bem-vindo ao Cola&Troca
    </h2>

    <p class="logo-subtitle">
      Plataforma de álbuns digitais
    </p>

  </div>

  <div class="header-right">

    <div class="coins-box">

      <mat-icon>
        paid
      </mat-icon>

      <div>
        <p class="coins-label">
          Coins
        </p>

        <p class="coins-value">
          {{ user()?.coins || 0 }}
        </p>
      </div>

    </div>

    <div class="profile-box">

      <div class="avatar">

        <img *ngIf="user()?.avatarUrl" [src]="user()?.avatarUrl" alt="Avatar" />

        <span *ngIf="!user()?.avatarUrl">
          {{
          user()?.nickname?.[0]
          || user()?.name?.[0]
          || 'U'
          }}
        </span>

      </div>

      <div class="profile-info">

        <p class="profile-name">
          {{ user()?.nickname || user()?.name || 'Usuário' }}
        </p>

        <p class="profile-role">
          Colecionador
        </p>

      </div>

    </div>

  </div>

</header>
