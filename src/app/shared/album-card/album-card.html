<div class="bg-zinc-950 border border-zinc-800 rounded-3xl overflow-hidden shadow-xl hover:scale-105 transition-all duration-300">

  <img
    [src]="album.coverUrl"
    class="w-full h-64 object-cover"
  />

  <div class="p-6">

    <h2 class="text-3xl font-bold text-white mb-2">
      {{ album.themeName }}
    </h2>

    <p class="text-zinc-400 mb-6">
      Álbum oficial da coleção.
    </p>

    <div class="flex items-center justify-between">

      <span class="text-3xl font-bold text-emerald-400">
        R$ {{ album.price }}
      </span>

      <a [routerLink]="['/album', album.id]"
        class="bg-emerald-500 hover:bg-emerald-600 px-5 py-3 rounded-xl text-white font-bold transition"
      >Ver Álbum</a>

    </div>

  </div>

</div>
